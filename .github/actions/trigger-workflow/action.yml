name: Trigger Workflow
description: Trigger a workflow and poll for run ID

inputs:
  workflow:
    description: Workflow file name
    required: true
  ref:
    description: Git ref to run on
    required: true
  channel:
    description: Channel input for the workflow
    required: false
    default: ""
  publish:
    description: Publish to Crabnebula and create GitHub release
    required: false
    default: ""
  platform:
    description: Platform input for the workflow
    required: false
    default: ""
  request_id:
    description: Unique request identifier for matching the dispatched run
    required: false
    default: ""
  token:
    description: GitHub token
    required: true
  repo:
    description: Repository (owner/repo)
    required: true
  max_attempts:
    description: Max polling attempts
    required: false
    default: "10"

outputs:
  run_id:
    description: The triggered workflow run ID
    value: ${{ steps.trigger.outputs.run_id }}

runs:
  using: composite
  steps:
    - id: trigger
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        REQUEST_ID: ${{ inputs.request_id }}
      run: |
        CMD=(gh workflow run "${{ inputs.workflow }}" --repo "${{ inputs.repo }}" --ref "${{ inputs.ref }}")
        if [[ -n "${{ inputs.channel }}" ]]; then
          CMD+=(-f "channel=${{ inputs.channel }}")
        fi
        if [[ -n "${{ inputs.publish }}" ]]; then
          CMD+=(-f "publish=${{ inputs.publish }}")
        fi
        if [[ -n "${{ inputs.platform }}" ]]; then
          CMD+=(-f "platform=${{ inputs.platform }}")
        fi
        if [[ -n "$REQUEST_ID" ]]; then
          CMD+=(-f "request_id=$REQUEST_ID")
        fi
        "${CMD[@]}"
        for i in $(seq 1 ${{ inputs.max_attempts }}); do
          sleep 5
          if [[ -n "$REQUEST_ID" ]]; then
            RUN_ID=$(gh run list --workflow="${{ inputs.workflow }}" --repo "${{ inputs.repo }}" --branch="${{ inputs.ref }}" --json databaseId,createdAt,displayTitle --jq 'map(select(.displayTitle | contains(env.REQUEST_ID))) | sort_by(.createdAt) | reverse | .[0].databaseId // empty')
          else
            RUN_ID=$(gh run list --workflow="${{ inputs.workflow }}" --repo "${{ inputs.repo }}" --branch="${{ inputs.ref }}" --json databaseId,createdAt --jq 'sort_by(.createdAt) | reverse | .[0].databaseId // empty')
          fi
          [ -n "$RUN_ID" ] && break
        done
        echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
