version: 2
updates:
  # Rust workspace (Cargo.toml + crates/*)
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      cargo-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # JS/TS workspace (pnpm, apps/* + packages/*)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Hold major bumps for now; revisit after v0.2
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
