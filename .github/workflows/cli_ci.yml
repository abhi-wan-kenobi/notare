on:
  pull_request:
    branches:
      - main
    paths:
      - "apps/cli/**"
      - "crates/**"

jobs:
  check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo check -p cli
      - run: cargo clippy -p cli -- -D warnings
