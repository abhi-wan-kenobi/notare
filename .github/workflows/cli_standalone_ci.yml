on:
  pull_request:
    branches:
      - main
    paths:
      - "apps/cli/**"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/cli_standalone_ci.yml"
      - ".github/actions/install_cli_deps/**"

jobs:
  check:
    if: ${{ !startsWith(github.head_ref || '', 'blog/') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            feature: standalone-linux
            clippy: false
          - os: macos-latest
            platform: macos
            feature: standalone-macos
            clippy: true
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install_cli_deps
      - if: matrix.clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - if: ${{ !matrix.clippy }}
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check -p cli --features ${{ matrix.feature }}
      - if: matrix.clippy
        run: cargo clippy -p cli --features ${{ matrix.feature }}
      - if: runner.os == 'macOS'
        run: |
          rustup target add x86_64-apple-darwin
          cargo check -p cli --features standalone-macos --target x86_64-apple-darwin

  e2e:
    if: ${{ !startsWith(github.head_ref || '', 'blog/') }}
    runs-on: macos-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install_cli_deps
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p cli --features standalone-macos,e2e -- --test-threads=1
