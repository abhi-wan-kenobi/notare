on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  actions: write
  issues: write
  pull-requests: write

jobs:
  check-permission:
    runs-on: ubuntu-latest
    outputs:
      allowed: ${{ steps.permission.outputs.allowed }}
    steps:
      - uses: actions/checkout@v4
      - id: permission
        uses: ./.github/actions/check-permission
        with:
          user: ${{ github.event.comment.user.login }}
          allowed-users: yujonglee|ComputelessComputer|goranmoomin|elstua

  parse-nightly-options:
    needs: check-permission
    if: needs.check-permission.outputs.allowed == 'true' && contains(github.event.comment.body, '/nightly')
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.parse.outputs.publish }}
    steps:
      - id: parse
        env:
          COMMENT: ${{ github.event.comment.body }}
        run: |
          PUBLISH="true"
          if [[ "$COMMENT" =~ --no-publish ]]; then
            PUBLISH="false"
          fi
          echo "publish=$PUBLISH" >> $GITHUB_OUTPUT

  handle-nightly:
    needs: [check-permission, parse-nightly-options]
    if: needs.check-permission.outputs.allowed == 'true' && contains(github.event.comment.body, '/nightly')
    uses: ./.github/workflows/handle_release.yaml
    with:
      channel: nightly
      publish: ${{ needs.parse-nightly-options.outputs.publish == 'true' }}
      issue_number: ${{ github.event.issue.number }}
      comment_id: ${{ github.event.comment.id }}
    secrets: inherit

  parse-stable-options:
    needs: check-permission
    if: needs.check-permission.outputs.allowed == 'true' && contains(github.event.comment.body, '/stable')
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.parse.outputs.publish }}
    steps:
      - id: parse
        env:
          COMMENT: ${{ github.event.comment.body }}
        run: |
          PUBLISH="true"
          if [[ "$COMMENT" =~ --no-publish ]]; then
            PUBLISH="false"
          fi
          echo "publish=$PUBLISH" >> $GITHUB_OUTPUT

  handle-stable:
    needs: [check-permission, parse-stable-options]
    if: needs.check-permission.outputs.allowed == 'true' && contains(github.event.comment.body, '/stable')
    uses: ./.github/workflows/handle_release.yaml
    with:
      channel: stable
      publish: ${{ needs.parse-stable-options.outputs.publish == 'true' }}
      issue_number: ${{ github.event.issue.number }}
      comment_id: ${{ github.event.comment.id }}
    secrets: inherit

  parse-staging-options:
    needs: check-permission
    if: needs.check-permission.outputs.allowed == 'true' && contains(github.event.comment.body, '/staging')
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.parse.outputs.ref }}
      platform: ${{ steps.parse.outputs.platform }}
    steps:
      - id: parse
        env:
          COMMENT: ${{ github.event.comment.body }}
        run: |
          PLATFORM="macos-aarch64"
          REF=""
          EXPECT_PLATFORM="false"
          SEEN_STAGING="false"

          NORMALIZED_COMMENT=$(printf '%s' "$COMMENT" | tr '\n' ' ')
          read -r -a TOKENS <<< "$NORMALIZED_COMMENT"

          for TOKEN in "${TOKENS[@]}"; do
            if [[ "$SEEN_STAGING" != "true" ]]; then
              if [[ "$TOKEN" == "/staging" ]]; then
                SEEN_STAGING="true"
              fi
              continue
            fi

            if [[ "$EXPECT_PLATFORM" == "true" ]]; then
              case "$TOKEN" in
                macos-aarch64|windows-x64|windows-arm64)
                  PLATFORM="$TOKEN"
                  ;;
                *)
                  echo "::error::Unsupported staging platform: $TOKEN"
                  exit 1
                  ;;
              esac
              EXPECT_PLATFORM="false"
              continue
            fi

            case "$TOKEN" in
              --platform)
                EXPECT_PLATFORM="true"
                ;;
              /*)
                break
                ;;
              -*)
                echo "::error::Unsupported /staging option: $TOKEN"
                exit 1
                ;;
              *)
                if [[ -z "$REF" ]]; then
                  REF="$TOKEN"
                fi
                ;;
            esac
          done

          if [[ "$EXPECT_PLATFORM" == "true" ]]; then
            echo "::error::Missing value for /staging --platform"
            exit 1
          fi

          if [[ -n "$REF" ]]; then
            echo "ref=$REF" >> "$GITHUB_OUTPUT"
          fi

          echo "platform=$PLATFORM" >> "$GITHUB_OUTPUT"

  handle-staging:
    needs: [check-permission, parse-staging-options]
    if: needs.check-permission.outputs.allowed == 'true' && contains(github.event.comment.body, '/staging')
    uses: ./.github/workflows/handle_staging.yaml
    with:
      ref: ${{ needs.parse-staging-options.outputs.ref }}
      platform: ${{ needs.parse-staging-options.outputs.platform }}
      issue_number: ${{ github.event.issue.number }}
      comment_id: ${{ github.event.comment.id }}
    secrets: inherit

  handle-update:
    needs: check-permission
    if: needs.check-permission.outputs.allowed == 'true' && contains(github.event.comment.body, '/update')
    uses: ./.github/workflows/handle_update.yaml
    with:
      issue_number: ${{ github.event.issue.number }}
      comment_id: ${{ github.event.comment.id }}
    secrets: inherit

  parse-changelog-channel:
    needs: check-permission
    if: needs.check-permission.outputs.allowed == 'true' && contains(github.event.comment.body, '/changelog')
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.parse.outputs.channel }}
    steps:
      - id: parse
        env:
          COMMENT: ${{ github.event.comment.body }}
        run: |
          if [[ "$COMMENT" =~ /changelog[[:space:]]+(nightly|stable)($|[[:space:]]) ]]; then
            echo "channel=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
          else
            echo "channel=nightly" >> $GITHUB_OUTPUT
          fi

  handle-changelog:
    needs: [check-permission, parse-changelog-channel]
    if: needs.check-permission.outputs.allowed == 'true' && contains(github.event.comment.body, '/changelog')
    uses: ./.github/workflows/changelog.yaml
    with:
      channel: ${{ needs.parse-changelog-channel.outputs.channel }}
      issue_number: ${{ github.event.issue.number }}
      comment_id: ${{ github.event.comment.id }}
    secrets: inherit
