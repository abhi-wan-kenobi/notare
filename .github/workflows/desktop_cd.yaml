on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        required: true
        type: choice
        options:
          - nightly
          - stable
      publish:
        description: "Publish to Crabnebula and create GitHub release"
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.channel }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/desktop_build.yaml
    with:
      channel: ${{ inputs.channel }}
      platforms: '["macos-aarch64", "macos-x86_64"]'
    secrets: inherit
  release:
    needs: build
    uses: ./.github/workflows/desktop_release.yaml
    with:
      channel: ${{ inputs.channel }}
      version: ${{ needs.build.outputs.version }}
      publish: ${{ inputs.publish }}
      release_assets: '[{"platform":"dmg-aarch64","output":"hyprnote-macos-aarch64.dmg"},{"platform":"dmg-x86_64","output":"hyprnote-macos-x86_64.dmg"}]'
    secrets: inherit
