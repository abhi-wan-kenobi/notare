# https://github.com/tauri-apps/tauri-action/blob/3013cac/examples/test-build-only.yml
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/desktop_ci.yaml
      - apps/cli/**
      - apps/desktop/**
      - plugins/**
      - crates/**
      - Cargo.toml
      - Cargo.lock
  pull_request:
    paths:
      - .github/workflows/desktop_ci.yaml
      - apps/cli/**
      - apps/desktop/**
      - plugins/**
      - crates/**
      - Cargo.toml
      - Cargo.lock

permissions:
  contents: read

jobs:
  desktop_ci:
    if: ${{ !startsWith(github.head_ref || '', 'blog/') }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos"
            runner: "macos-15"
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/pnpm_install
      - uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
      - run: pnpm -F ui build
      - run: pnpm -F desktop typecheck
      - run: pnpm -F desktop test
      - uses: ./.github/actions/install_desktop_deps
        with:
          target: ${{ matrix.platform }}
      - uses: ./.github/actions/rust_install
        with:
          platform: ${{ matrix.platform }}
      - if: matrix.platform == 'macos'
        run: echo "SDKROOT=$(xcrun --sdk macosx --show-sdk-path)" >> $GITHUB_ENV
      - run: cargo check --locked -p desktop
      - run: cargo test --locked -p desktop
      - run: |
          cargo test --locked --workspace \
            --exclude desktop \
            --exclude control-tauri \
            --exclude ai \
            --exclude email \
            --exclude lago \
            --exclude mac \
            --exclude notch \
            --exclude notification-macos \
            --exclude notification-macos2 \
            --exclude tcc \
            --exclude apple-note \
            --exclude notification-linux \
            --exclude am \
            --exclude aec \
            --exclude agc \
            --exclude whisper \
            --exclude whisper-local \
            --exclude whisper-local-model \
            --exclude vad2 \
            --exclude vad \
            --exclude vvad \
            --exclude vad-masking \
            --exclude vad-chunking \
            --exclude onnx \
            --exclude text-embedding \
            --exclude pyannote-local \
            --exclude llama \
            --exclude tools \
            --exclude docs \
            --exclude bundle \
            --exclude host \
            --exclude intercept \
            --exclude frontmatter \
            --exclude openstatus \
            --exclude audio \
            --exclude audio-device \
            --exclude transcribe-whisper-local \
            --exclude device-monitor \
            --exclude local-llm-core \
            --exclude local-stt-server \
            --exclude mobile-bridge \
            --exclude tauri-plugin-analytics\
            --exclude tauri-plugin-apple-calendar \
            --exclude tauri-plugin-audio-priority \
            --exclude tauri-plugin-auth \
            --exclude tauri-plugin-bedrock \
            --exclude tauri-plugin-db2 \
            --exclude tauri-plugin-deeplink2 \
            --exclude tauri-plugin-detect \
            --exclude tauri-plugin-fs-db \
            --exclude tauri-plugin-fs-sync \
            --exclude tauri-plugin-fs2 \
            --exclude tauri-plugin-hooks \
            --exclude tauri-plugin-icon \
            --exclude tauri-plugin-importer \
            --exclude tauri-plugin-js \
            --exclude tauri-plugin-listener \
            --exclude tauri-plugin-listener2 \
            --exclude tauri-plugin-local-llm \
            --exclude tauri-plugin-local-stt \
            --exclude tauri-plugin-misc \
            --exclude tauri-plugin-network \
            --exclude tauri-plugin-notification \
            --exclude tauri-plugin-notify \
            --exclude tauri-plugin-opener2 \
            --exclude tauri-plugin-overlay \
            --exclude tauri-plugin-path2 \
            --exclude tauri-plugin-pdf \
            --exclude tauri-plugin-permissions \
            --exclude tauri-plugin-screen \
            --exclude tauri-plugin-settings \
            --exclude tauri-plugin-sfx \
            --exclude tauri-plugin-sidecar2 \
            --exclude tauri-plugin-store2 \
            --exclude tauri-plugin-tantivy \
            --exclude tauri-plugin-template \
            --exclude tauri-plugin-tracing \
            --exclude tauri-plugin-tray \
            --exclude tauri-plugin-updater2 \
            --exclude tauri-plugin-webhook \
            --exclude tauri-plugin-windows \
            --exclude db3 \
            --exclude db-core \
            --exclude activity-capture-macos \
            --exclude tauri-plugin-activity-capture
      - run: |
          git diff --exit-code -- \
            plugins/db/js/bindings.gen.ts \
            plugins/db/permissions/autogenerated \
            plugins/db/permissions/schemas/schema.json

  desktop_i18n:
    if: ${{ !startsWith(github.head_ref || '', 'blog/') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/pnpm_install
      - run: pnpm -F desktop i18n:check

  desktop_swift:
    if: ${{ !startsWith(github.head_ref || '', 'blog/') }}
    runs-on: macos-15
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          persist-credentials: false
      - run: swift build --package-path plugins/windows/swift-lib

  # WS-F1 PR3: Linux coverage for crates the macOS workspace-test job excludes.
  # Lists derive from an empirical per-crate probe on Linux (2026-07-23, results
  # table in the PR): every crate below passed `cargo check --locked`; the test
  # list additionally passed its full test suite. Excluded-with-reason:
  # - db-core: covered by cli_ci (--lib); its e2e needs SQLITECLOUD_URL.
  # - email: its test asserts macOS-only behavior (check-only here).
  # - mobile-bridge, tauri-plugin-tantivy: tests FAIL on Linux today (latent —
  #   tantivy's test_english_stemmer_tokenizer; tracked as WS-F1 follow-ups).
  # - tauri-plugin-screen: check passes, test target does not compile on Linux.
  # - heavy native family (aec/agc/am/audio/audio-device/vad*/whisper*/
  #   pyannote-local/transcribe-whisper-local): probed green locally but kept
  #   out of the per-PR path for runner cost; candidates for a scheduled job.
  linux_crate_check:
    if: ${{ !startsWith(github.head_ref || '', 'blog/') }}
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive
          persist-credentials: false
      # Several excluded crates pull in tauri/gtk (glib-sys), which needs the
      # Linux desktop system libraries — same deps the macOS desktop job installs.
      - uses: ./.github/actions/install_desktop_deps
        with:
          target: linux
      - uses: ./.github/actions/rust_install
        with:
          platform: linux
      - name: Check wrongly-excluded crates (check-only tier)
        run: |
          cargo check --locked \
            -p onnx \
            -p db-core \
            -p email \
            -p mobile-bridge \
            -p tauri-plugin-tantivy \
            -p tauri-plugin-screen
      - name: Test wrongly-excluded crates (proven green on Linux)
        run: |
          cargo test --locked --no-fail-fast \
            -p device-monitor \
            -p frontmatter \
            -p host \
            -p intercept \
            -p local-llm-core \
            -p notification-linux \
            -p openstatus \
            -p tauri-plugin-analytics \
            -p tauri-plugin-audio-priority \
            -p tauri-plugin-auth \
            -p tauri-plugin-bedrock \
            -p tauri-plugin-deeplink2 \
            -p tauri-plugin-detect \
            -p tauri-plugin-fs2 \
            -p tauri-plugin-fs-sync \
            -p tauri-plugin-hooks \
            -p tauri-plugin-icon \
            -p tauri-plugin-importer \
            -p tauri-plugin-js \
            -p tauri-plugin-local-llm \
            -p tauri-plugin-local-stt \
            -p tauri-plugin-misc \
            -p tauri-plugin-notification \
            -p tauri-plugin-notify \
            -p tauri-plugin-opener2 \
            -p tauri-plugin-overlay \
            -p tauri-plugin-path2 \
            -p tauri-plugin-permissions \
            -p tauri-plugin-settings \
            -p tauri-plugin-sfx \
            -p tauri-plugin-sidecar2 \
            -p tauri-plugin-store2 \
            -p tauri-plugin-template \
            -p tauri-plugin-tracing \
            -p tauri-plugin-updater2 \
            -p tauri-plugin-webhook

  ci:
    if: always()
    needs: [desktop_ci, desktop_i18n, desktop_swift, linux_crate_check]
    runs-on: ubuntu-latest
    steps:
      - run: exit 1
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
