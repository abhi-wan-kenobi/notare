name: desktop_test_build

# Unsigned test builds for manual testing — not releases.
on:
  workflow_dispatch:
    inputs:
      os:
        description: "Which OS to build"
        type: choice
        default: windows
        options: [windows, macos, linux]
      gpu:
        description: >-
          GPU acceleration: "vulkan" offloads whisper.cpp (windows/linux);
          "directml" offloads Parakeet/ONNX (windows only, no build SDK);
          "voxtral-cuda" builds the Voxtral (llama.cpp) engine with CUDA
          (windows only — manual NVIDIA validation, never in release.yaml;
          see issue #16 Phase B / #18 and docs/BUILDING.md)
        type: choice
        default: none
        options: [none, vulkan, directml, voxtral-cuda]

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ inputs.os == 'windows' && 'windows-latest' || inputs.os == 'macos' && 'macos-latest' || 'ubuntu-24.04' }}
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      # voxtral-cuda is a Windows-only test-build variant (issue #16 Phase B):
      # llama.cpp's CUDA backend needs the CUDA toolkit installed on the build
      # machine, and this workflow only wires that up for windows-latest. Fail
      # fast with a clear message instead of silently building a CPU artifact.
      - if: inputs.gpu == 'voxtral-cuda' && inputs.os != 'windows'
        run: |
          echo "::error::voxtral-cuda is a Windows-only test-build variant (no CUDA toolkit setup wired up for ${{ inputs.os }})."
          exit 1

      - if: inputs.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential file libxdo-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev xdg-utils libgtk-3-dev libgtk-4-dev \
            libasound2-dev libudev-dev libpulse-dev libpipewire-0.3-dev libgraphene-1.0-dev \
            pkg-config patchelf cmake libclang-dev clang

      # Vulkan build deps: loader headers for find_package(Vulkan) + glslc for
      # whisper.cpp's shader compilation (GGML_VULKAN).
      - if: inputs.os == 'linux' && inputs.gpu == 'vulkan'
        run: sudo apt-get install -y libvulkan-dev glslc

      # Sets VULKAN_SDK and puts its Bin (glslc.exe) on PATH; whisper-rs-sys's
      # cmake finds the SDK through VULKAN_SDK. Same action meetily uses for
      # their Windows release default.
      - if: inputs.os == 'windows' && inputs.gpu == 'vulkan'
        uses: humbletim/install-vulkan-sdk@30ba978f977e81b72d091fc8888feb1fb26f9aff # v1.2
        with:
          version: 1.4.309.0
          cache: true

      # CUDA toolkit for the Voxtral (llama.cpp) engine's `cuda` feature
      # (llama-cpp-2/llama-cpp-sys-2 build llama.cpp's CUDA backend via CMake
      # + nvcc). Version pinned to a release with prebuilt Windows network
      # installers on the Jimver action's index; bump alongside llama-cpp-2
      # if a build ever needs a newer toolkit. Cached like the Vulkan SDK
      # above — this download is large (~3GB) and this is a manual/rare
      # workflow, so cache misses are expected and fine, not a regression.
      - if: inputs.os == 'windows' && inputs.gpu == 'voxtral-cuda'
        uses: Jimver/cuda-toolkit@c35baa1a18fd1fc9dcf47c5bd839bf30559c0bc3 # v0.2.24
        id: cuda-toolkit
        with:
          cuda: "12.4.1"
          method: network
          use-github-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: corepack enable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: gpu-${{ inputs.gpu }}

      - run: pnpm install
        env:
          NODE_OPTIONS: ""

      # tauri's beforeBuildCommand runs `pnpm -F desktop build`, which does
      # not build workspace packages the app imports (e.g. @hypr/ui).
      - run: pnpm exec turbo run build --filter=@hypr/ui

      # bindgen (libsqlite3-sys, whisper-rs-sys) needs libclang. On Windows
      # point at the preinstalled LLVM. On macOS point inside the Xcode
      # toolchain. NEVER set LIBCLANG_PATH to an empty string — clang-sys then
      # searches only "" and skips its default paths (broke the first macOS
      # build: "couldn't find any valid shared libraries ... (invalid: [])").
      - if: inputs.os == 'windows'
        shell: pwsh
        run: Add-Content $env:GITHUB_ENV 'LIBCLANG_PATH=C:\Program Files\LLVM\bin'
      - if: inputs.os == 'macos'
        run: echo "LIBCLANG_PATH=$(dirname "$(dirname "$(xcrun --find clang)")")/lib" >> "$GITHUB_ENV"

      # whisper.cpp's vulkan-shaders-gen nested CMake fails under the default
      # Visual Studio generator (VCTargetsPath probe) and the in-repo target
      # dir exceeds Windows MAX_PATH (~230 chars of build dirs). Ninja inside
      # an MSVC dev env + a short CARGO_TARGET_DIR are the proven fixes —
      # same as the release workflow (release.yaml build-windows) and local
      # builds (docs/BUILDING.md "Windows Vulkan build gotchas"). Only needed
      # for the Windows Vulkan build; CPU-only Windows builds stay on the
      # default generator + in-repo target dir.
      #
      # Applied to voxtral-cuda too, on the same theory: llama.cpp's CUDA
      # backend is also a nested CMake build triggered by a `*-sys` crate
      # (llama-cpp-sys-2), so it's exposed to the same MSBuild/MAX_PATH class
      # of failure. Unverified end-to-end on this box (no CUDA hardware here
      # — see the live smoke-test note in the PR); Abhishek's Windows/NVIDIA
      # run is the first real test of this path, drop/adjust if it turns out
      # unnecessary or wrong for nvcc.
      - if: inputs.os == 'windows' && (inputs.gpu == 'vulkan' || inputs.gpu == 'voxtral-cuda')
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0
      - if: inputs.os == 'windows' && (inputs.gpu == 'vulkan' || inputs.gpu == 'voxtral-cuda')
        shell: pwsh
        run: |
          Add-Content $env:GITHUB_ENV 'CMAKE_GENERATOR=Ninja'
          Add-Content $env:GITHUB_ENV 'CARGO_TARGET_DIR=D:\nb'
          Add-Content $env:GITHUB_ENV 'CC=cl'
          Add-Content $env:GITHUB_ENV 'CXX=cl'

      # `directml`/`voxtral-cuda` are Windows-only and need no build-time
      # Vulkan SDK, so they skip the Ninja/CARGO_TARGET_DIR workaround above
      # (that's whisper.cpp/Vulkan-shader-gen-specific).
      - run: pnpm -F desktop tauri build --config ./src-tauri/tauri.conf.citest.json ${{ (inputs.gpu == 'vulkan' && inputs.os != 'macos' && '--features gpu-vulkan') || (inputs.gpu == 'directml' && inputs.os == 'windows' && '--features directml') || (inputs.gpu == 'voxtral-cuda' && inputs.os == 'windows' && '--features voxtral-cuda') || '' }}
        env:
          CI: false

      # Windows Vulkan/voxtral-cuda builds emit their bundle under D:\nb (the
      # CARGO_TARGET_DIR MAX_PATH workaround above), which is on a different
      # drive root than the repo. upload-artifact@v4 rejects a path list
      # whose entries share only a drive root ("rootDirectory ... is not a
      # parent directory of the file"), so stage the D:\nb bundle into the
      # in-repo target bundle dir first — then the upload sees one root
      # tree. No-op otherwise (bundle is already in-repo).
      - if: inputs.os == 'windows' && (inputs.gpu == 'vulkan' || inputs.gpu == 'voxtral-cuda')
        shell: pwsh
        run: |
          $src = 'D:\nb\release\bundle'
          $dst = 'apps\desktop\src-tauri\target\release\bundle'
          if (Test-Path $src) {
            New-Item -ItemType Directory -Force -Path $dst | Out-Null
            Copy-Item -Path "$src\*" -Destination $dst -Recurse -Force
          }

      # notare-windows-voxtral-cuda is a manual NVIDIA-validation build, not
      # a release artifact: CPU Voxtral (RTF ~0.9, verified) ships to every
      # Windows/Linux user via the normal `voxtral-llama` feature baked into
      # tauri-plugin-local-stt's default target deps (see
      # apps/desktop/src-tauri/Cargo.toml); `voxtral-cuda` is never added to
      # release.yaml. See docs/BUILDING.md "Voxtral (llama.cpp) engine".
      - uses: actions/upload-artifact@v7
        with:
          name: notare-${{ inputs.os }}${{ (inputs.gpu == 'vulkan' && '-vulkan') || (inputs.gpu == 'directml' && '-directml') || (inputs.gpu == 'voxtral-cuda' && '-voxtral-cuda') || '' }}
          # All bundle files are staged under the in-repo target bundle dir
          # (see the copy step above for the Windows Vulkan case), so a
          # single root tree is uploaded. The build step itself is the
          # compile gate, so a missing path set must not fail the run
          # (warn, not error).
          path: |
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn
