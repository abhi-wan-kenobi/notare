name: desktop_test_build

# Unsigned test builds for manual testing — not releases.
on:
  workflow_dispatch:
    inputs:
      os:
        description: "Which OS to build"
        type: choice
        default: windows
        options: [windows, macos, linux]
      gpu:
        description: "GPU acceleration for whisper.cpp (windows/linux only)"
        type: choice
        default: none
        options: [none, vulkan]

jobs:
  build:
    runs-on: ${{ inputs.os == 'windows' && 'windows-latest' || inputs.os == 'macos' && 'macos-latest' || 'ubuntu-24.04' }}
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - if: inputs.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential file libxdo-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev xdg-utils libgtk-3-dev libgtk-4-dev \
            libasound2-dev libudev-dev libpulse-dev libpipewire-0.3-dev libgraphene-1.0-dev \
            pkg-config patchelf cmake libclang-dev clang

      # Vulkan build deps: loader headers for find_package(Vulkan) + glslc for
      # whisper.cpp's shader compilation (GGML_VULKAN).
      - if: inputs.os == 'linux' && inputs.gpu == 'vulkan'
        run: sudo apt-get install -y libvulkan-dev glslc

      # Sets VULKAN_SDK and puts its Bin (glslc.exe) on PATH; whisper-rs-sys's
      # cmake finds the SDK through VULKAN_SDK. Same action meetily uses for
      # their Windows release default.
      - if: inputs.os == 'windows' && inputs.gpu == 'vulkan'
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.4.309.0
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: corepack enable

      - uses: Swatinem/rust-cache@v2
        with:
          key: gpu-${{ inputs.gpu }}

      - run: pnpm install
        env:
          NODE_OPTIONS: ""

      # tauri's beforeBuildCommand runs `pnpm -F desktop build`, which does
      # not build workspace packages the app imports (e.g. @hypr/ui).
      - run: pnpm exec turbo run build --filter=@hypr/ui

      # bindgen (libsqlite3-sys, whisper-rs-sys) needs libclang. On Windows
      # point at the preinstalled LLVM. On macOS point inside the Xcode
      # toolchain. NEVER set LIBCLANG_PATH to an empty string — clang-sys then
      # searches only "" and skips its default paths (broke the first macOS
      # build: "couldn't find any valid shared libraries ... (invalid: [])").
      - if: inputs.os == 'windows'
        shell: pwsh
        run: Add-Content $env:GITHUB_ENV 'LIBCLANG_PATH=C:\Program Files\LLVM\bin'
      - if: inputs.os == 'macos'
        run: echo "LIBCLANG_PATH=$(dirname "$(dirname "$(xcrun --find clang)")")/lib" >> "$GITHUB_ENV"

      # whisper.cpp's vulkan-shaders-gen nested CMake fails under the default
      # Visual Studio generator (VCTargetsPath probe) and the in-repo target
      # dir exceeds Windows MAX_PATH (~230 chars of build dirs). Ninja inside
      # an MSVC dev env + a short CARGO_TARGET_DIR are the proven fixes —
      # same as the release workflow (release.yaml build-windows) and local
      # builds (docs/BUILDING.md "Windows Vulkan build gotchas"). Only needed
      # for the Windows Vulkan build; CPU-only Windows builds stay on the
      # default generator + in-repo target dir.
      - if: inputs.os == 'windows' && inputs.gpu == 'vulkan'
        uses: ilammy/msvc-dev-cmd@v1
      - if: inputs.os == 'windows' && inputs.gpu == 'vulkan'
        shell: pwsh
        run: |
          Add-Content $env:GITHUB_ENV 'CMAKE_GENERATOR=Ninja'
          Add-Content $env:GITHUB_ENV 'CARGO_TARGET_DIR=D:\nb'
          Add-Content $env:GITHUB_ENV 'CC=cl'
          Add-Content $env:GITHUB_ENV 'CXX=cl'

      - run: pnpm -F desktop tauri build --config ./src-tauri/tauri.conf.citest.json ${{ inputs.gpu == 'vulkan' && inputs.os != 'macos' && '--features gpu-vulkan' || '' }}
        env:
          CI: false

      - uses: actions/upload-artifact@v4
        with:
          name: notare-${{ inputs.os }}${{ inputs.gpu == 'vulkan' && '-vulkan' || '' }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error
