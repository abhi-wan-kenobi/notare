name: release

# Signed stable releases with updater artifacts, published to GitHub Releases.
# Triggered by pushing a v* tag. macOS builds are UNSIGNED (no Apple
# certificates yet) and Apple Silicon only; updater artifacts are still
# minisign-signed on every platform.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      # Sets VULKAN_SDK and puts its Bin (glslc.exe) on PATH; whisper-rs-sys's
      # cmake finds the SDK through VULKAN_SDK.
      - uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.4.309.0
          cache: true

      # LLVM (libclang for bindgen) is preinstalled on windows-latest runners;
      # install it only if the image ever drops it.
      - shell: pwsh
        run: |
          if (!(Test-Path "C:\Program Files\LLVM\bin\libclang.dll")) {
            choco install llvm -y --no-progress
          }

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: corepack enable

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-gpu-vulkan

      - run: pnpm install
        env:
          NODE_OPTIONS: ""

      # tauri's beforeBuildCommand runs `pnpm -F desktop build`, which does
      # not build workspace packages the app imports (e.g. @hypr/ui).
      - run: pnpm exec turbo run build --filter=@hypr/ui

      # whisper.cpp's vulkan-shaders-gen nested CMake fails under the default
      # Visual Studio generator (VCTargetsPath probe). Ninja inside an MSVC
      # dev environment is the proven fix (same as local builds; see
      # docs/BUILDING.md "Windows Vulkan build gotchas").
      - uses: ilammy/msvc-dev-cmd@v1

      # `directml` rides the same Windows build as `gpu-vulkan`: it's a
      # separate engine (Parakeet/ONNX Runtime vs. whisper.cpp/Vulkan) but
      # needs no extra SDK at build time (ONNX Runtime's prebuilt Windows
      # binaries already ship DirectML support) and falls back to CPU at
      # runtime if unavailable — see docs/BUILDING.md "GPU builds
      # (Parakeet)". Linux does NOT get `directml` (Windows-only EP).
      - run: pnpm -F desktop tauri build --config ./src-tauri/tauri.conf.stable.json --features gpu-vulkan,directml
        env:
          CI: false
          LIBCLANG_PATH: 'C:\Program Files\LLVM\bin'
          CMAKE_GENERATOR: Ninja
          # whisper.cpp's vulkan-shaders-gen nests ~230 chars of build dirs;
          # under the repo's apps/desktop/src-tauri/target it exceeds Windows
          # MAX_PATH. Same fix as local builds (docs/BUILDING.md).
          CARGO_TARGET_DIR: 'D:\nb'
          CC: cl
          CXX: cl
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - uses: actions/upload-artifact@v4
        with:
          name: bundles-windows
          path: |
            D:/nb/release/bundle/msi/*.msi
            D:/nb/release/bundle/msi/*.msi.sig
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential file libxdo-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev xdg-utils libgtk-3-dev libgtk-4-dev \
            libasound2-dev libudev-dev libpulse-dev libpipewire-0.3-dev libgraphene-1.0-dev \
            pkg-config patchelf cmake libclang-dev clang libvulkan-dev glslc

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: corepack enable

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-gpu-vulkan

      - run: pnpm install
        env:
          NODE_OPTIONS: ""

      - run: pnpm exec turbo run build --filter=@hypr/ui

      - run: pnpm -F desktop tauri build --config ./src-tauri/tauri.conf.stable.json --features gpu-vulkan
        env:
          CI: false
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - uses: actions/upload-artifact@v4
        with:
          name: bundles-linux
          path: |
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage.sig
          if-no-files-found: error

  # macos-latest runners are Apple Silicon (aarch64) — Intel is not built.
  # No Apple code signing (unsigned by design for now); the minisign updater
  # signing (TAURI_SIGNING_*) is separate and still applies. The macOS updater
  # artifact is the .app.tar.gz (+ .sig) from bundle/macos/, NOT the .dmg.
  # binaries/check-permissions is compiled automatically by build.rs (swiftc,
  # preinstalled on macOS runners).
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: corepack enable

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-macos

      - run: pnpm install
        env:
          NODE_OPTIONS: ""

      - run: pnpm exec turbo run build --filter=@hypr/ui

      # bindgen (libsqlite3-sys, whisper-rs-sys) needs libclang.dylib from the
      # Xcode toolchain; set it explicitly (and never to an empty string —
      # clang-sys treats set-but-empty as "search nowhere").
      - run: echo "LIBCLANG_PATH=$(dirname "$(dirname "$(xcrun --find clang)")")/lib" >> "$GITHUB_ENV"

      # Tauri v2 merges --config files in order (later wins; arrays replaced),
      # so the -macos overlay only swaps bundle.targets to ["app", "dmg"] while
      # version/identifier/updater stay in tauri.conf.stable.json. No
      # gpu-vulkan feature — whisper.cpp uses Metal/CPU on macOS.
      - run: pnpm -F desktop tauri build --config ./src-tauri/tauri.conf.stable.json --config ./src-tauri/tauri.conf.stable-macos.json
        env:
          CI: false
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - uses: actions/upload-artifact@v4
        with:
          name: bundles-macos
          path: |
            apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz
            apps/desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: error

  publish:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      # Flatten (upload-artifact preserves the bundle/<kind>/ subdirs) and
      # build the updater manifest latest.json that the app polls.
      - name: Assemble assets + latest.json
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find artifacts -type f \( -name '*.msi' -o -name '*.msi.sig' -o -name '*.deb' -o -name '*.AppImage' -o -name '*.AppImage.sig' -o -name '*.dmg' -o -name '*.app.tar.gz' -o -name '*.app.tar.gz.sig' \) -exec cp {} release-assets/ \;
          ls -la release-assets/

          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"

          cd release-assets
          MSI=$(ls *.msi)
          APPIMAGE=$(ls *.AppImage)
          # macOS updater artifact = the .app.tar.gz (the .dmg is download-only).
          MACTAR=$(ls *.app.tar.gz)
          [ -f "${MSI}.sig" ] || { echo "missing ${MSI}.sig"; exit 1; }
          [ -f "${APPIMAGE}.sig" ] || { echo "missing ${APPIMAGE}.sig"; exit 1; }
          [ -f "${MACTAR}.sig" ] || { echo "missing ${MACTAR}.sig"; exit 1; }

          urlenc() { jq -rn --arg s "$1" '$s|@uri'; }
          MSI_URL="https://github.com/${REPO}/releases/download/${TAG}/$(urlenc "$MSI")"
          APPIMAGE_URL="https://github.com/${REPO}/releases/download/${TAG}/$(urlenc "$APPIMAGE")"
          MACTAR_URL="https://github.com/${REPO}/releases/download/${TAG}/$(urlenc "$MACTAR")"

          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg win_sig "$(cat "${MSI}.sig")" \
            --arg win_url "$MSI_URL" \
            --arg lin_sig "$(cat "${APPIMAGE}.sig")" \
            --arg lin_url "$APPIMAGE_URL" \
            --arg mac_sig "$(cat "${MACTAR}.sig")" \
            --arg mac_url "$MACTAR_URL" \
            '{
              version: $version,
              notes: "See the release notes on GitHub.",
              pub_date: $pub_date,
              platforms: {
                "windows-x86_64": { signature: $win_sig, url: $win_url },
                "linux-x86_64": { signature: $lin_sig, url: $lin_url },
                "darwin-aarch64": { signature: $mac_sig, url: $mac_url }
              }
            }' > latest.json
          cat latest.json

      - uses: softprops/action-gh-release@v2
        with:
          name: Notare ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            > **macOS (Apple Silicon only for now):** the `.dmg` is **unsigned**
            > (no Apple certificates yet). Drag **Notare** to Applications, then
            > strip the quarantine flag before opening — otherwise macOS will
            > claim the app is "damaged" and refuse to launch:
            >
            > ```
            > xattr -cr /Applications/Notare.app
            > ```
            >
            > **Windows:** builds are unsigned — SmartScreen will warn; choose
            > "More info → Run anyway".
          files: |
            release-assets/*.msi
            release-assets/*.msi.sig
            release-assets/*.deb
            release-assets/*.AppImage
            release-assets/*.AppImage.sig
            release-assets/*.dmg
            release-assets/*.app.tar.gz
            release-assets/*.app.tar.gz.sig
            release-assets/latest.json
          fail_on_unmatched_files: true
