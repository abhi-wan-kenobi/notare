name: release

# Signed stable releases with updater artifacts, published to GitHub Releases.
# Triggered by pushing a v* tag. macOS builds are UNSIGNED (no Apple
# certificates yet) and Apple Silicon only; updater artifacts are still
# minisign-signed on every platform.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      # Sets VULKAN_SDK and puts its Bin (glslc.exe) on PATH; whisper-rs-sys's
      # cmake finds the SDK through VULKAN_SDK.
      - uses: humbletim/install-vulkan-sdk@30ba978f977e81b72d091fc8888feb1fb26f9aff # v1.2
        with:
          version: 1.4.309.0
          cache: true

      # LLVM (libclang for bindgen) is preinstalled on windows-latest runners;
      # install it only if the image ever drops it.
      - shell: pwsh
        run: |
          if (!(Test-Path "C:\Program Files\LLVM\bin\libclang.dll")) {
            choco install llvm -y --no-progress
          }

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: corepack enable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: release-gpu-vulkan

      - run: pnpm install
        env:
          NODE_OPTIONS: ""

      # tauri's beforeBuildCommand runs `pnpm -F desktop build`, which does
      # not build workspace packages the app imports (e.g. @hypr/ui).
      - run: pnpm exec turbo run build --filter=@hypr/ui

      # whisper.cpp's vulkan-shaders-gen nested CMake fails under the default
      # Visual Studio generator (VCTargetsPath probe). Ninja inside an MSVC
      # dev environment is the proven fix (same as local builds; see
      # docs/BUILDING.md "Windows Vulkan build gotchas").
      - uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0

      # `directml` rides the same Windows build as `gpu-vulkan`: it's a
      # separate engine (Parakeet/ONNX Runtime vs. whisper.cpp/Vulkan) but
      # needs no extra SDK at build time (ONNX Runtime's prebuilt Windows
      # binaries already ship DirectML support) and falls back to CPU at
      # runtime if unavailable — see docs/BUILDING.md "GPU builds
      # (Parakeet)". Linux does NOT get `directml` (Windows-only EP).
      - run: pnpm -F desktop tauri build --config ./src-tauri/tauri.conf.stable.json --features gpu-vulkan,directml
        env:
          CI: false
          LIBCLANG_PATH: 'C:\Program Files\LLVM\bin'
          CMAKE_GENERATOR: Ninja
          # whisper.cpp's vulkan-shaders-gen nests ~230 chars of build dirs;
          # under the repo's apps/desktop/src-tauri/target it exceeds Windows
          # MAX_PATH. Same fix as local builds (docs/BUILDING.md).
          CARGO_TARGET_DIR: 'D:\nb'
          CC: cl
          CXX: cl
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - uses: actions/upload-artifact@v4
        with:
          name: bundles-windows
          path: |
            D:/nb/release/bundle/msi/*.msi
            D:/nb/release/bundle/msi/*.msi.sig
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      # ubuntu-24.04 restricts unprivileged user namespaces via AppArmor, which
      # breaks AppImage tooling (linuxdeploy) even with APPIMAGE_EXTRACT_AND_RUN.
      # Allow them so the AppImage bundles.
      - run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential file libxdo-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev xdg-utils libgtk-3-dev libgtk-4-dev \
            libasound2-dev libudev-dev libpulse-dev libpipewire-0.3-dev libgraphene-1.0-dev \
            pkg-config patchelf cmake libclang-dev clang libvulkan-dev glslc libfuse2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: corepack enable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: release-gpu-vulkan

      - run: pnpm install
        env:
          NODE_OPTIONS: ""

      - run: pnpm exec turbo run build --filter=@hypr/ui

      - run: pnpm -F desktop tauri build --config ./src-tauri/tauri.conf.stable.json --features gpu-vulkan
        env:
          CI: false
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # linuxdeploy is itself an AppImage; GitHub's ubuntu runners no longer
          # ship FUSE, so it can't mount/run → "failed to run linuxdeploy" during
          # AppImage bundling. Extract-and-run instead of mounting via FUSE.
          APPIMAGE_EXTRACT_AND_RUN: "1"
          # THE real fix: the app links sherpa's libsherpa-onnx-c-api.so +
          # libonnxruntime.so dynamically (build-script output next to the
          # binary). linuxdeploy walks NEEDED libs and errored "Could not find
          # dependency: libsherpa-onnx-c-api.so" (tauri swallowed it as the
          # opaque "failed to run linuxdeploy"). Point it at the target dir so it
          # bundles them into the AppImage.
          LD_LIBRARY_PATH: ${{ github.workspace }}/apps/desktop/src-tauri/target/release

      - uses: actions/upload-artifact@v4
        with:
          name: bundles-linux
          path: |
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage.sig
          if-no-files-found: error

  # macos-latest runners are Apple Silicon (aarch64) — Intel is not built.
  # Apple Developer ID signing + notarization run inside `tauri build` (issue
  # #19): APPLE_CERTIFICATE/PASSWORD import the Developer ID cert into a
  # temporary keychain, APPLE_SIGNING_IDENTITY selects it, and the
  # APPLE_API_* trio (App Store Connect key) notarizes + staples the .app and
  # .dmg. The minisign updater signing (TAURI_SIGNING_*) is separate and still
  # applies. The macOS updater artifact is the .app.tar.gz (+ .sig) from
  # bundle/macos/, NOT the .dmg. binaries/check-permissions is compiled
  # automatically by build.rs (swiftc, preinstalled on macOS runners).
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: corepack enable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: release-macos-arm64-v2

      - run: pnpm install
        env:
          NODE_OPTIONS: ""

      - run: pnpm exec turbo run build --filter=@hypr/ui

      # bindgen (libsqlite3-sys, whisper-rs-sys) needs libclang.dylib from the
      # Xcode toolchain; set it explicitly (and never to an empty string —
      # clang-sys treats set-but-empty as "search nowhere").
      - run: echo "LIBCLANG_PATH=$(dirname "$(dirname "$(xcrun --find clang)")")/lib" >> "$GITHUB_ENV"

      # notarytool authenticates with the App Store Connect API key (.p8);
      # write it to a runner-temp file the bundler can read via
      # APPLE_API_KEY_PATH. RUNNER_TEMP is wiped when the job ends.
      - run: |
          echo "$APPLE_API_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/apple_api_key.p8"
          echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/apple_api_key.p8" >> "$GITHUB_ENV"
        env:
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}

      # Tauri v2 merges --config files in order (later wins; arrays replaced),
      # so the -macos overlay swaps bundle.targets to ["app", "dmg"] and sets
      # the real Developer ID signingIdentity (the base config's ad-hoc "-" is
      # for dev/citest); version/identifier/updater stay in
      # tauri.conf.stable.json. No gpu-vulkan feature — whisper.cpp uses
      # Metal/CPU on macOS. APPLE_CERTIFICATE/PASSWORD import the Developer ID
      # cert into a temp keychain; the bundler then codesigns, notarizes via
      # the App Store Connect key (APPLE_API_*), and staples the ticket.
      - run: pnpm -F desktop tauri build --config ./src-tauri/tauri.conf.stable.json --config ./src-tauri/tauri.conf.stable-macos.json
        env:
          CI: false
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple Developer ID signing + notarization (re-enabled 2026-07-21:
          # the account's stuck first notarization cleared — submissions now
          # Accepted). Signs + notarizes + staples the .app and .dmg.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: "Developer ID Application: Abhishek Gupta (M4MVC745NX)"
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}

      - uses: actions/upload-artifact@v4
        with:
          name: bundles-macos
          path: |
            apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz
            apps/desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: error

  publish:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      # Flatten (upload-artifact preserves the bundle/<kind>/ subdirs) and
      # build the updater manifest latest.json that the app polls.
      - name: Assemble assets + latest.json
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find artifacts -type f \( -name '*.msi' -o -name '*.msi.sig' -o -name '*.deb' -o -name '*.AppImage' -o -name '*.AppImage.sig' -o -name '*.dmg' -o -name '*.app.tar.gz' -o -name '*.app.tar.gz.sig' \) -exec cp {} release-assets/ \;
          ls -la release-assets/

          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"

          cd release-assets
          MSI=$(ls *.msi)
          APPIMAGE=$(ls *.AppImage)
          # macOS updater artifact = the .app.tar.gz (the .dmg is download-only).
          MACTAR=$(ls *.app.tar.gz)
          [ -f "${MSI}.sig" ] || { echo "missing ${MSI}.sig"; exit 1; }
          [ -f "${APPIMAGE}.sig" ] || { echo "missing ${APPIMAGE}.sig"; exit 1; }
          [ -f "${MACTAR}.sig" ] || { echo "missing ${MACTAR}.sig"; exit 1; }

          urlenc() { jq -rn --arg s "$1" '$s|@uri'; }
          MSI_URL="https://github.com/${REPO}/releases/download/${TAG}/$(urlenc "$MSI")"
          APPIMAGE_URL="https://github.com/${REPO}/releases/download/${TAG}/$(urlenc "$APPIMAGE")"
          MACTAR_URL="https://github.com/${REPO}/releases/download/${TAG}/$(urlenc "$MACTAR")"

          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg win_sig "$(cat "${MSI}.sig")" \
            --arg win_url "$MSI_URL" \
            --arg lin_sig "$(cat "${APPIMAGE}.sig")" \
            --arg lin_url "$APPIMAGE_URL" \
            --arg mac_sig "$(cat "${MACTAR}.sig")" \
            --arg mac_url "$MACTAR_URL" \
            '{
              version: $version,
              notes: "See the release notes on GitHub.",
              pub_date: $pub_date,
              platforms: {
                "windows-x86_64": { signature: $win_sig, url: $win_url },
                "linux-x86_64": { signature: $lin_sig, url: $lin_url },
                "darwin-aarch64": { signature: $mac_sig, url: $mac_url }
              }
            }' > latest.json
          cat latest.json

      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          name: Notare ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            > **macOS (Apple Silicon only for now):** the `.dmg` is **unsigned**
            > (no Apple certificates yet). Drag **Notare** to Applications, then
            > strip the quarantine flag before opening — otherwise macOS will
            > claim the app is "damaged" and refuse to launch:
            >
            > ```
            > xattr -cr /Applications/Notare.app
            > ```
            >
            > **Windows:** builds are unsigned — SmartScreen will warn; choose
            > "More info → Run anyway".
          files: |
            release-assets/*.msi
            release-assets/*.msi.sig
            release-assets/*.deb
            release-assets/*.AppImage
            release-assets/*.AppImage.sig
            release-assets/*.dmg
            release-assets/*.app.tar.gz
            release-assets/*.app.tar.gz.sig
            release-assets/latest.json
          fail_on_unmatched_files: true
