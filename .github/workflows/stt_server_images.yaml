name: stt_server_images

# Publishes the Notare STT companion server (issue #14) as multi-variant
# container images to GHCR: cpu, vulkan (AMD/Intel/NVIDIA via Vulkan), and
# cuda (NVIDIA). Runs on release tags (so v0.3.0 ships pullable images) and
# on demand. Build != run: the GPU images compile fine on GPU-less runners;
# the GPU is only needed at runtime (see docs/stt-server-design.md).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (default: dev). Release runs use the git tag."
        type: string
        default: dev

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/notare-stt

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        variant: [cpu, vulkan, cuda, rocm]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      # CUDA base images are large; reclaim runner disk before building.
      - name: Free disk space
        if: matrix.variant == 'cuda'
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true
          large-packages: false

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # version = the git tag (release) or the dispatch input (default "dev").
      - id: meta
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.tag }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # Tags: the immutable versioned tag, plus a moving per-variant tag
          # (e.g. :vulkan) that always points at the newest of that variant.
          echo "tags=${IMAGE}:${{ matrix.variant }}-${VERSION},${IMAGE}:${{ matrix.variant }}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/stt-server/Dockerfile.${{ matrix.variant }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=stt-${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=stt-${{ matrix.variant }}
          provenance: false
