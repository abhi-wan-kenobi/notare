on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup_flathub

      - name: Build Flatpak
        run: flatpak-builder --user --force-clean build-dir flatpak/com.hyprnote.app.yml
