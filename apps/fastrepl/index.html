<!DOCTYPE html>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

  <body class="min-h-screen bg-[color:var(--color-page)] text-[color:var(--color-fg)] font-sans antialiased">
    <div class="mx-auto flex min-h-screen max-w-6xl flex-col px-6 py-10 sm:px-10 sm:py-16">
