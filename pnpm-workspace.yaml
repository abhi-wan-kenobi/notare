packages:
  - apps/*
  - packages/*
  - plugins/*
  - examples/plugins/*
  - e2e/*

publicHoistPattern:
  - "!bun-types"
  - "!@types/bun"

overrides:
  prosemirror-view: "1.41.7"
  lightningcss: "1.30.1"
  basic-ftp: "5.3.1"
  fast-uri: "3.1.2"
  fast-xml-builder: "1.1.7"
  hono: "4.12.25"
  js-cookie: "3.0.7"
  linkify-it: "5.0.1"
  lodash: "4.18.1"
  "undici@6": "6.27.0"
  "undici@7": "7.28.0"
  ws: "8.21.0"
  dompurify: "3.4.11"
  mermaid: "11.15.0"
  markdown-it: "14.2.0"
  uuid: "11.1.1"
  "uuid@13": "13.0.1"
  ip-address: "10.1.1"
  fast-xml-parser: "5.7.0"
  "@opentelemetry/core": "2.8.0"
  esbuild: "0.25.0"
  "esbuild@0.27": "0.28.1"
  js-yaml: "4.2.0"
  "tar@7": "7.5.16"
  "@babel/core": "7.29.6"

peerDependencyRules:
  allowedVersions:
    motion: "11"
    react: "19"
    "@lobehub/ui": "3.4.0"
    unist-util-visit: "5"
    esbuild: "0.25"

allowBuilds:
  "@infisical/cli": true
  "@parcel/watcher": true
  "@sentry/cli": true
  cbor-extract: true
  core-js: true
  dprint: true
  edgedriver: true
  esbuild: true
  geckodriver: true
  netlify: true
  protobufjs: true
  puppeteer: true
  sharp: true
  supabase: true
  unix-dgram: true
