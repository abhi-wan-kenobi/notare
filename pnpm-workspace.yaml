packages:
  - apps/*
  - packages/*
  - plugins/*
  - examples/plugins/*
  - e2e/*

publicHoistPattern:
  - "!bun-types"
  - "!@types/bun"

overrides:
  prosemirror-view: "1.41.7"
  lightningcss: "1.30.1"
  basic-ftp: "5.3.1"
  fast-uri: "3.1.2"
  fast-xml-builder: "1.1.7"
  hono: "4.12.25"
  js-cookie: "3.0.7"
  linkify-it: "5.0.1"
  lodash: "4.18.1"
  "undici@6": "6.27.0"
  "undici@7": "7.28.0"
  ws: "8.21.0"

peerDependencyRules:
  allowedVersions:
    motion: "11"
    react: "19"
    "@lobehub/ui": "3.4.0"
    unist-util-visit: "5"
    esbuild: "0.25"

allowBuilds:
  "@infisical/cli": true
  "@parcel/watcher": true
  "@sentry/cli": true
  cbor-extract: true
  core-js: true
  dprint: true
  edgedriver: true
  esbuild: true
  geckodriver: true
  netlify: true
  protobufjs: true
  puppeteer: true
  sharp: true
  supabase: true
  unix-dgram: true
